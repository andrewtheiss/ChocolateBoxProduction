dispenser:
  port: /dev/ttyUSB0
  baud: 9600
  initial_state: IDLE
  sensors: [ir_stack]  # Example: List for future validation

roller:
  port: /dev/ttyUSB1
  baud: 9600
  initial_state: IDLE

punch:
  port: /dev/ttyUSB2
  baud: 9600
  initial_state: IDLE

crease:
  port: /dev/ttyUSB3
  baud: 9600
  initial_state: IDLE

# Add e.g., folder: {port: /dev/ttyUSB4, ...}